<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 18</title>
</head>
<body>
    <h1>Ejercicio 18</h1>
    <p>Elabore un formulario que solicite nombre del cliente, producto, cantidad y precio unitario, y muestre una factura con subtotal y total.</p>
    <h2>Formulario de factura</h2>
    <form action="Ejercicio_18.php" method="POST">
        <label for="cliente">Nombre del cliente:</label>
        <input type="text" id="cliente" name="cliente" required><br><br>
        <label for="producto">Producto:</label>
        <input type="text" id="producto" name="producto" required><br><br>
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" min="1" required><br><br>
        <label for="precio">Precio unitario ($):</label>
        <input type="number" id="precio" name="precio" step="0.01" min="0" required><br><br>
        <button type="submit">Generar factura</button>
    </form>
</body>
</html>
